<div class="seccion-foto {{ seccion.estilo }}">
	{% if seccion.titulo_superior %}
		<div class="row no-gutters">
			<div class="col-md-12 text-center titulo-gris">
				<h2>{{ seccion.titulo_superior }}</h2>
			</div>
		</div>
	{% endif %}
	<div class="row no-gutters">
		<div class="col-md-12 text-center">
			<h3>{{ seccion.titulo }}</h3>
		</div>
	</div>
	<div class="row no-gutters">
		<div class="col-10 offset-1">
			{% for fila in seccion.filas %}
				<div class="row">
					{% for foto in fila.fotos %}
						<div class="col {% if fila.offset and forloop.counter0 == 0 %} {{ fila.offset }}{% endif %}">
							{% if foto.destino %}
								<a href="{{ foto.destino }}">
							{% endif %}
							<img class="d-block w-100" src="{{ MEDIA_URL }}{{ foto.imagen }}" alt="{{ foto.texto }}"/>
							<p>{{ foto.texto }}</p>
							{% if foto.destino %}
								</a>
							{% endif %}
						</div>
					{% endfor %}
				</div>
			{% endfor %}
		</div>
	</div>
</div>
